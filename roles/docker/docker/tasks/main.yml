---
- name: Uninstall unofficial
  become: true
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose
      - docker-compose-v2
      - docker-doc
      - podman-docker
    state: absent

- name: Install
  when: docker_state == 'present'
  ansible.builtin.include_tasks: install.yml

- name: Uninstall
  when: docker_state == 'absent'
  ansible.builtin.include_tasks: uninstall.yml
