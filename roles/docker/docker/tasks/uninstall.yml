---
- name: System prune
  ansible.builtin.command:
    cmd: docker system prune -af
  failed_when: false

- name: Uninstall
  become: true
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: absent
