---
# Ref: https://specifications.freedesktop.org/basedir-spec/latest.
- name: Set facts
  ansible.builtin.set_fact:
    bootstrap_env: |
      {{
        ansible_facts['env'] | combine({
          'XDG_DATA_HOME': ansible_facts['env']['HOME'] + '/.local/share',
          'XDG_CONFIG_HOME': ansible_facts['env']['HOME'] + '/.config',
          'XDG_STATE_HOME': ansible_facts['env']['HOME'] + '/.local/state',
          'XDG_CACHE_HOME': ansible_facts['env']['HOME'] + '/.cache',
          'PATH': ansible_facts['env']['HOME'] + '/.local/bin:' + ansible_facts['env']['PATH']
        })
      }}

- name: Configure zsh
  ansible.builtin.blockinfile:
    path: "{{ ansible_facts['env']['HOME'] }}/.zshrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK FOR XDG"
    prepend_newline: true
    append_newline: true
    block: |
      export XDG_DATA_HOME="$HOME/.local/share"
      export XDG_CONFIG_HOME="$HOME/.config"
      export XDG_STATE_HOME="$HOME/.local/state"
      export XDG_CACHE_HOME="$HOME/.cache"
      export PATH="$HOME/.local/bin:$PATH"
