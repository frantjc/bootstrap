plugins:
  netshoot-namespace:
    shortCut: Shift-D
    description: netshoot
    scopes:
      - namespaces
    background: false
    command: sh
    args:
      - -c
      - >-
        kubectl run netshoot-$(od -An -N2 -tu2 /dev/urandom | tr -d ' ')
        --image=nicolaka/netshoot
        -it
        --rm
        --namespace=$NAME

  netshoot-pod:
    shortCut: Shift-D
    description: netshoot
    scopes:
      - pods
    background: false
    command: kubectl
    args:
      - debug
      - --namespace=$NAMESPACE
      - $NAME
      - -it
      - --image=nicolaka/netshoot
      - --profile=netadmin

  netshoot-node:
    shortCut: Shift-D
    description: netshoot
    scopes:
      - nodes
    background: false
    command: kubectl
    args:
      - debug
      - node/$NAME
      - --image=nicolaka/netshoot
      - -it
      - --profile=sysadmin

  nsenter:
    shortCut: Shift-W
    description: nsenter
    scopes:
      - nodes
    background: false
    command: sh
    args:
      - -c
      - >-
        kubectl run node-nsenter-$NAME-$(od -An -N2 -tu2 /dev/urandom | tr -d ' ')
        --image=nicolaka/netshoot
        -it
        --rm
        --privileged
        --overrides='{"spec":{"hostPID":true,"hostNetwork":true,"nodeName":"$NAME"}}'
        -- nsenter --target 1 --mount --uts --ipc --net --pid -- bash
