---
- name: Stat
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/pokemon/reborn/Game.AppImage"
  register: stat

- name: Install
  when: not stat.stat.exists
  block:
    - name: Tmp download dir
      ansible.builtin.tempfile:
        state: directory
      register: download

    - name: Download
      ansible.builtin.shell:
        cmd: curl -fsSLo "{{ download.path }}/reborn-linux.zip" https://pkmnfan.games/reborn-linux

    - name: Install dir
      ansible.builtin.file:
        path: "{{ ansible_facts['env']['HOME'] }}/pokemon/reborn"
        state: directory

    - name: Unzip
      ansible.builtin.shell:
        chdir: "{{ ansible_facts['env']['HOME'] }}/pokemon/reborn"
        cmd: |
          unzip "{{ download.path }}/reborn-linux.zip"
          chmod +x "{{ ansible_facts['env']['HOME'] }}/pokemon/reborn/Game.AppImage"
        creates: "{{ ansible_facts['env']['HOME'] }}/pokemon/reborn/Game.AppImage"
