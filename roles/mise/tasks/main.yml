---
- name: Install
  ansible.builtin.shell:
    cmd: curl https://mise.run | {{ ansible_env.SHELL }}
    creates: "{{ ansible_env.HOME }}/.local/bin/mise"

- name: Configure
  ansible.builtin.template:
    src: config.toml.j2
    dest: "{{ ansible_env.HOME }}/.config/mise/config.toml"

- name: Prepare
  ansible.builtin.shell:
    chdir: "{{ ansible_env.HOME }}/.config/mise"
    cmd: mise install
